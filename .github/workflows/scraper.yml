name: Actualitzar dades FECAPA

on:
  schedule:
    # Cada nit a les 02:00 UTC (03:00 o 04:00 hora catalana)
    - cron: '0 2 * * *'
  # Permet executar manualment des de GitHub
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repositori
        uses: actions/checkout@v4

      - name: Instal·lar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Executar scraper
        run: node api/scraper.js

      - name: Commit i push del data.json actualitzat
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          git diff --staged --quiet || git commit -m "🏒 Actualitza dades FECAPA $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
