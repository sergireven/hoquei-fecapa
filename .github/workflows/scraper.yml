name: Actualitzar dades FECAPA

on:
  schedule:
    - cron: '0 10 * * 1-5'
    - cron: '0 8 * * 0,6'
    - cron: '0 11 * * 0,6'
    - cron: '0 14 * * 0,6'
    - cron: '0 17 * * 0,6'
    - cron: '0 20 * * 0,6'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout repositori
        uses: actions/checkout@v4

      - name: Instal·lar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instal·lar dependències
        run: npm install

      - name: Executar scraper principal
        run: node api/scraper.js

      - name: Executar scraper sidgad (dades jugadors)
        run: node api/scraper-sidgad.js

      - name: Commit i push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🏒 Actualitza dades FECAPA"
          file_pattern: public/data.json public/actes/*.json public/jugadors-sidgad.json public/jugadors-sidgad-index.json
