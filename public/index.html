<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>FECAPA · Hoquei Patins Catalunya</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>

  <style>
    /* ── Reset & tokens ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:     #e5001c;
      --red-d:   #b50016;
      --blue:    #003da5;
      --blue-l:  #1a5dc7;
      --gold:    #f0a500;
      --silver:  #8a9bb5;
      --bronze:  #c06020;
      --bg:      #f5f6fa;
      --card:    #ffffff;
      --border:  #e2e6ef;
      --text:    #1a2035;
      --muted:   #6b7a99;
      --font-d:  'Barlow Condensed', sans-serif;
      --font-b:  'Barlow', sans-serif;
      --shadow:  0 2px 12px rgba(0,30,80,.08);
      --shadow-l:0 1px 4px rgba(0,30,80,.05);
    }

    html { scroll-behavior: smooth; }
    body { font-family: var(--font-b); background: var(--bg); color: var(--text); min-height: 100vh; }
    button, input, select { font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Animations ── */
    @keyframes fadeUp  { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:none } }
    @keyframes spin    { to { transform:rotate(360deg) } }
    @keyframes shimmer { from { background-position:-200% 0 } to { background-position:200% 0 } }
    .fade-up { animation: fadeUp .35s ease both; }

    /* ── Skeleton loading ── */
    .skel {
      background: linear-gradient(90deg, #e8eaf0 25%, #f2f4f8 50%, #e8eaf0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── SCREEN: Loading ── */
    #screen-loading {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; gap: 20px;
    }
    .loading-logo { font-family: var(--font-d); font-size: 56px; font-weight: 900; color: var(--red); letter-spacing: -2px; line-height: 1; }
    .loading-sub  { font-family: var(--font-d); font-size: 18px; font-weight: 600; color: var(--muted); letter-spacing: .15em; text-transform: uppercase; }
    .spinner { width: 36px; height: 36px; border: 3px solid #e8eaf0; border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite; margin-top: 8px; }
    .loading-note { font-size: 13px; color: var(--muted); }

    /* ── SCREEN: Picker ── */
    #screen-picker { display: none; flex-direction: column; min-height: 100vh; }

    .picker-hero {
      background: linear-gradient(135deg, var(--blue) 0%, #001f6e 55%, var(--red) 100%);
      padding: 36px 20px 28px;
      position: relative; overflow: hidden;
    }
    .picker-hero::before {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .hero-inner { max-width: 560px; margin: 0 auto; position: relative; z-index: 1; }
    .hero-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2); border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 600; color: rgba(255,255,255,.85); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 14px; }
    .hero-title { font-family: var(--font-d); font-size: clamp(32px, 8vw, 52px); font-weight: 900; color: #fff; line-height: .95; letter-spacing: -1px; margin-bottom: 8px; }
    .hero-title span { color: var(--gold); }
    .hero-sub { font-size: 14px; color: rgba(255,255,255,.65); margin-bottom: 20px; }

    /* Search */
    .search-wrap { position: relative; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,.5); font-size: 16px; pointer-events: none; }
    #search-input {
      width: 100%; background: rgba(255,255,255,.12); backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,.25); border-radius: 14px;
      padding: 13px 14px 13px 42px; font-size: 15px; color: #fff; outline: none;
      transition: border-color .2s;
    }
    #search-input::placeholder { color: rgba(255,255,255,.45); }
    #search-input:focus { border-color: rgba(255,255,255,.6); background: rgba(255,255,255,.18); }

    /* Filter tabs */
    .filter-wrap { background: #fff; border-bottom: 1px solid var(--border); overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
    .filter-inner { display: inline-flex; padding: 0 16px; gap: 2px; min-width: 100%; }
    .filter-btn {
      background: none; border: none; border-bottom: 3px solid transparent;
      font-family: var(--font-d); font-size: 14px; font-weight: 700; letter-spacing: .05em;
      color: var(--muted); padding: 12px 14px 9px; cursor: pointer; white-space: nowrap;
      transition: all .15s; text-transform: uppercase;
    }
    .filter-btn:hover { color: var(--text); }
    .filter-btn.active { color: var(--red); border-bottom-color: var(--red); }

    /* Competition groups */
    .picker-body { flex: 1; max-width: 640px; margin: 0 auto; width: 100%; padding: 20px 14px 32px; }

    .cat-group { margin-bottom: 28px; }
    .cat-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .cat-emoji { font-size: 18px; }
    .cat-title { font-family: var(--font-d); font-size: 20px; font-weight: 800; color: var(--text); letter-spacing: -.3px; text-transform: uppercase; }
    .cat-count { font-size: 11px; font-weight: 700; color: var(--muted); background: var(--border); border-radius: 10px; padding: 2px 8px; }

    /* Competition card */
    .comp-card {
      background: var(--card); border: 1.5px solid var(--border); border-radius: 14px;
      margin-bottom: 8px; overflow: hidden; cursor: pointer;
      transition: all .15s; box-shadow: var(--shadow-l);
    }
    .comp-card:hover { border-color: var(--blue-l); box-shadow: var(--shadow); transform: translateY(-1px); }
    .comp-card-inner { display: flex; align-items: center; gap: 12px; padding: 12px 14px; }
    .comp-pct { width: 40px; height: 40px; border-radius: 10px; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .comp-pct span { font-family: var(--font-d); font-size: 13px; font-weight: 800; color: var(--blue); }
    .comp-info { flex: 1; min-width: 0; }
    .comp-name { font-family: var(--font-d); font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .comp-teams-count { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .comp-arrow { color: var(--muted); font-size: 18px; flex-shrink: 0; }

    /* Progress bar on card */
    .comp-progress { height: 3px; background: var(--bg); }
    .comp-progress-bar { height: 100%; background: linear-gradient(90deg, var(--blue), var(--red)); transition: width .3s; }

    /* ── SCREEN: Competition detail ── */
    #screen-detail { display: none; flex-direction: column; min-height: 100vh; }

    /* Detail header */
    .detail-header {
      background: linear-gradient(135deg, var(--blue) 0%, #001850 100%);
      padding: 14px 16px 0; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(0,20,60,.3);
    }
    .detail-back { display: flex; align-items: center; gap: 8px; cursor: pointer; margin-bottom: 12px; }
    .back-btn {
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.2);
      color: #fff; border-radius: 8px; padding: 6px 12px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .back-btn:hover { background: rgba(255,255,255,.25); }
    .detail-comp-name { font-family: var(--font-d); font-size: clamp(18px, 5vw, 26px); font-weight: 900; color: #fff; letter-spacing: -.5px; line-height: 1.1; margin-bottom: 4px; }
    .detail-meta { font-size: 12px; color: rgba(255,255,255,.6); margin-bottom: 12px; }

    /* Detail tabs */
    .detail-tabs { display: flex; gap: 2px; overflow-x: auto; white-space: nowrap; }
    .detail-tab {
      background: none; border: none; border-bottom: 3px solid transparent;
      font-family: var(--font-d); font-size: 15px; font-weight: 700;
      color: rgba(255,255,255,.55); padding: 10px 16px 7px; cursor: pointer;
      text-transform: uppercase; letter-spacing: .05em; transition: all .15s;
    }
    .detail-tab.active { color: #fff; border-bottom-color: var(--gold); }
    .detail-tab:hover { color: rgba(255,255,255,.85); }

    /* Detail body */
    .detail-body { flex: 1; max-width: 680px; margin: 0 auto; width: 100%; padding: 18px 14px 32px; }

    /* Panel visibility */
    .panel { display: none; }
    .panel.active { display: block; animation: fadeUp .25s ease; }

    /* ── Classification table ── */
    .classif-wrap { background: var(--card); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); }
    .classif-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .classif-table thead tr { background: var(--bg); }
    .classif-table th {
      padding: 9px 8px; font-family: var(--font-d); font-size: 11px; font-weight: 700;
      color: var(--muted); letter-spacing: .06em; text-align: center;
      border-bottom: 1px solid var(--border); text-transform: uppercase;
    }
    .classif-table th:nth-child(2) { text-align: left; }
    .classif-table td { padding: 10px 8px; border-bottom: 1px solid #f0f2f8; text-align: center; }
    .classif-table td:nth-child(2) { text-align: left; }
    .classif-table tr:last-child td { border-bottom: none; }
    .classif-table tr.my-team { background: #eff6ff; }
    .classif-table tr.my-team td { font-weight: 700; }

    .pos-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 26px; height: 26px; border-radius: 50%;
      font-family: var(--font-d); font-size: 14px; font-weight: 800;
    }
    .pos-1 { background: #fef3c7; color: #b45309; }
    .pos-2 { background: #f1f5f9; color: #64748b; }
    .pos-3 { background: #fef3c7; color: #c05e2a; }
    .pos-n { background: transparent; color: var(--muted); }

    /* Team name with shield */
    .team-name-cell { display: flex; align-items: center; gap: 8px; }
    .team-shield {
      width: 24px; height: 24px; object-fit: contain; flex-shrink: 0;
      background: var(--bg); border-radius: 4px; padding: 2px;
    }
    .team-shield-placeholder { width: 24px; height: 24px; background: var(--bg); border-radius: 4px; display: inline-block; }
    .my-team-arrow { color: var(--red); font-size: 10px; }

    /* ── Calendar ── */
    .cal-section { margin-bottom: 16px; }
    .cal-jornada-label {
      font-family: var(--font-d); font-size: 12px; font-weight: 700; color: var(--muted);
      letter-spacing: .1em; text-transform: uppercase; padding: 0 4px; margin-bottom: 6px;
    }

    .match-card {
      background: var(--card); border: 1.5px solid var(--border); border-radius: 12px;
      padding: 12px 14px; margin-bottom: 6px; box-shadow: var(--shadow-l);
    }
    .match-card.played { border-left: 4px solid transparent; }
    .match-card.win  { border-left-color: #16a34a; }
    .match-card.draw { border-left-color: #d97706; }
    .match-card.loss { border-left-color: #dc2626; }
    .match-card.pending { border-left: 4px solid var(--blue-l); background: #f8faff; }

    .match-teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px; }
    .match-team { display: flex; align-items: center; gap: 8px; }
    .match-team.right { flex-direction: row-reverse; }
    .match-team-shield { width: 28px; height: 28px; object-fit: contain; background: var(--bg); border-radius: 6px; padding: 2px; }
    .match-team-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.2; }
    .match-team.right .match-team-name { text-align: right; }
    .match-team-name.highlighted { color: var(--blue); font-weight: 800; }

    .match-score-block { text-align: center; }
    .match-score {
      background: var(--red); color: #fff; border-radius: 8px;
      padding: 5px 10px; font-family: var(--font-d); font-size: 18px; font-weight: 900;
      letter-spacing: .05em; display: inline-block; min-width: 60px;
    }
    .match-score.pending { background: var(--blue-l); font-size: 13px; padding: 4px 8px; }
    .match-date { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .match-result-badge {
      display: inline-flex; font-family: var(--font-d); font-size: 11px; font-weight: 700;
      padding: 1px 7px; border-radius: 8px; margin-top: 5px;
    }
    .badge-win  { background: #dcfce7; color: #16a34a; }
    .badge-draw { background: #fef3c7; color: #b45309; }
    .badge-loss { background: #fee2e2; color: #dc2626; }

    /* ── Summary panel ── */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
    .stat-card {
      background: var(--card); border-radius: 12px; padding: 14px 8px; text-align: center;
      box-shadow: var(--shadow-l); border: 1.5px solid var(--border);
    }
    .stat-value { font-family: var(--font-d); font-size: 26px; font-weight: 900; line-height: 1; }
    .stat-label { font-size: 10px; font-weight: 700; color: var(--muted); margin-top: 4px; letter-spacing: .06em; text-transform: uppercase; }

    .section-title {
      font-family: var(--font-d); font-size: 13px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .1em; margin-bottom: 8px; padding: 0 2px;
    }

    /* ── Update notice ── */
    .update-box {
      background: #eff6ff; border: 1.5px solid #bfdbfe; border-radius: 12px;
      padding: 12px 14px; display: flex; gap: 10px; align-items: flex-start; margin-top: 16px;
    }
    .update-box p { font-size: 12px; color: #1d4ed8; line-height: 1.5; }
    .update-box strong { font-weight: 700; }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty-state .empty-icon { font-size: 44px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.5; }
    .empty-state a { color: var(--blue); font-weight: 600; text-decoration: none; }

    /* ── Team selector inside competition ── */
    .team-filter-wrap { margin-bottom: 16px; }
    .team-filter-label { font-family: var(--font-d); font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 6px; }
    .team-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .team-chip {
      display: flex; align-items: center; gap: 6px;
      background: var(--card); border: 1.5px solid var(--border); border-radius: 20px;
      padding: 5px 12px 5px 7px; font-size: 13px; font-weight: 600; color: var(--text);
      cursor: pointer; transition: all .15s;
    }
    .team-chip:hover  { border-color: var(--blue-l); color: var(--blue); }
    .team-chip.active { background: var(--blue); border-color: var(--blue); color: #fff; }
    .team-chip img    { width: 18px; height: 18px; object-fit: contain; }

    /* Responsive */
    @media (max-width: 480px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .match-team-name { font-size: 12px; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- LOADING -->
  <div id="screen-loading">
    <div class="loading-logo">🏒 FECAPA</div>
    <div class="loading-sub">Hoquei Patins Catalunya</div>
    <div class="spinner"></div>
    <div class="loading-note" id="loading-note">Carregant dades...</div>
  </div>

  <!-- PICKER -->
  <div id="screen-picker">
    <div class="picker-hero">
      <div class="hero-inner">
        <div class="hero-badge">🏒 Temporada <span id="hero-season">2025-26</span></div>
        <h1 class="hero-title">HOQUEI<br/><span>PATINS</span><br/>CATALUNYA</h1>
        <p class="hero-sub" id="hero-sub">Totes les competicions de la FECAPA</p>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input id="search-input" type="text" placeholder="Cerca equip, competició..." autocomplete="off" autocorrect="off"/>
        </div>
      </div>
    </div>

    <div class="filter-wrap">
      <div class="filter-inner" id="filter-tabs"></div>
    </div>

    <div class="picker-body" id="picker-body"></div>
  </div>

  <!-- DETAIL -->
  <div id="screen-detail">
    <div class="detail-header">
      <div class="detail-back">
        <button class="back-btn" id="back-btn">← Competicions</button>
      </div>
      <div class="detail-comp-name" id="detail-comp-name"></div>
      <div class="detail-meta" id="detail-meta"></div>
      <div class="detail-tabs">
        <button class="detail-tab active" data-tab="summary">Resum</button>
        <button class="detail-tab" data-tab="classif">Classificació</button>
        <button class="detail-tab" data-tab="calendar">Calendari</button>
      </div>
    </div>
    <div class="detail-body">
      <div id="panel-summary" class="panel active"></div>
      <div id="panel-classif" class="panel"></div>
      <div id="panel-calendar" class="panel"></div>
    </div>
  </div>

</div>
<script src="js/app.js"></script>
</body>
</html>
