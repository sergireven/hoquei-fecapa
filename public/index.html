<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>FECAPA · Hoquei Patins Catalunya</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red:    #e5001c; --red-d:  #b50016;
      --blue:   #003da5; --blue-l: #1a5dc7;
      --gold:   #f0a500; --bg:     #f0f4f8;
      --card:   #ffffff; --border: #e2e6ef;
      --text:   #1a2035; --muted:  #6b7a99;
      --font-d: 'Barlow Condensed', sans-serif;
      --font-b: 'Barlow', sans-serif;
      --shadow: 0 2px 12px rgba(0,30,80,.08);
    }
    html { scroll-behavior:smooth; }
    body { font-family:var(--font-b); background:var(--bg); color:var(--text); min-height:100vh; }
    button,input,select { font-family:inherit; }
    ::-webkit-scrollbar { width:4px; height:4px; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
    a { color:var(--blue); }

    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
    @keyframes spin   { to{transform:rotate(360deg)} }

    /* ── Loading ── */
    #screen-loading {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-height:100vh; gap:16px;
    }
    .loading-logo { font-family:var(--font-d); font-size:52px; font-weight:900; color:var(--red); }
    .loading-sub  { font-family:var(--font-d); font-size:16px; color:var(--muted); letter-spacing:.15em; text-transform:uppercase; }
    .spinner { width:36px;height:36px;border:3px solid #e8eaf0;border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite; }

    /* ── Home ── */
    #screen-home { display:flex; flex-direction:column; min-height:100vh; }
    .hero {
      background:linear-gradient(135deg,var(--blue) 0%,#001f6e 55%,var(--red) 100%);
      padding:32px 20px 24px; position:relative; overflow:hidden;
    }
    .hero::before {
      content:''; position:absolute; inset:0;
      background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff' fill-opacity='.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
    }
    .hero-inner  { max-width:560px; margin:0 auto; position:relative; z-index:1; }
    .hero-badge  { display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2); border-radius:20px; padding:4px 12px; font-size:11px; font-weight:600; color:rgba(255,255,255,.85); letter-spacing:.1em; text-transform:uppercase; margin-bottom:12px; }
    .hero-title  { font-family:var(--font-d); font-size:clamp(28px,8vw,48px); font-weight:900; color:#fff; line-height:.95; letter-spacing:-1px; margin-bottom:8px; }
    .hero-title span { color:var(--gold); }
    .hero-sub    { font-size:13px; color:rgba(255,255,255,.65); margin-bottom:18px; }
    .btn-primary { background:var(--red); border:none; color:#fff; font-weight:700; font-size:15px; padding:12px 24px; border-radius:12px; cursor:pointer; display:inline-flex; align-items:center; gap:8px; }

    .home-header { background:#fff; border-bottom:1px solid var(--border); padding:12px 16px; position:sticky; top:0; z-index:50; }
    .home-header-inner { max-width:640px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; }
    .home-logo   { font-family:var(--font-d); font-size:18px; font-weight:800; color:var(--text); }
    .home-logo span { color:var(--red); }
    .btn-search  { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:8px 14px; cursor:pointer; font-size:16px; }

    .home-body   { max-width:640px; margin:0 auto; width:100%; padding:18px 14px 32px; }
    .home-section-title { font-family:var(--font-d); font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-bottom:12px; }
    .empty-favs  { text-align:center; padding:40px 20px; color:var(--muted); }
    .btn-add-fav { width:100%; background:var(--card); border:2px dashed var(--border); color:var(--muted); font-size:14px; font-weight:600; padding:14px; border-radius:14px; cursor:pointer; margin-top:8px; }
    .btn-add-fav:hover { border-color:var(--blue-l); color:var(--blue); }
    .update-note { text-align:center; font-size:11px; color:var(--muted); margin-top:16px; }

    /* ── Fav cards ── */
    .fav-card {
      background:var(--card); border:1.5px solid var(--border); border-top:3px solid var(--cat-color,var(--red));
      border-radius:14px; overflow:hidden; margin-bottom:14px; box-shadow:var(--shadow);
      animation:fadeUp .3s ease;
    }
    .fav-header  { display:flex; align-items:center; gap:10px; padding:13px 14px; background:linear-gradient(135deg,rgba(0,61,165,.05),transparent); border-bottom:1px solid var(--border); }
    .fav-shield-img { width:36px; height:36px; object-fit:contain; background:var(--bg); border-radius:8px; padding:2px; }
    .fav-title   { flex:1; min-width:0; }
    .fav-team    { font-family:var(--font-d); font-size:17px; font-weight:800; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .fav-comp    { font-size:11px; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .fav-remove  { background:none; border:none; color:var(--muted); font-size:14px; cursor:pointer; padding:4px; border-radius:6px; }
    .fav-remove:hover { color:var(--red); background:rgba(229,0,28,.08); }

    .fav-stats   { display:grid; grid-template-columns:repeat(4,1fr); gap:0; border-bottom:1px solid var(--border); }
    .fav-stat    { text-align:center; padding:10px 6px; border-right:1px solid var(--border); }
    .fav-stat:last-child { border-right:none; }
    .fav-stat-val { font-family:var(--font-d); font-size:22px; font-weight:900; line-height:1; }
    .fav-stat-lbl { font-size:10px; color:var(--muted); margin-top:3px; text-transform:uppercase; letter-spacing:.04em; }

    .fav-section-title { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; padding:10px 14px 4px; }
    .fav-actions { display:flex; gap:8px; padding:10px 14px 12px; border-top:1px solid var(--border); margin-top:4px; }
    .btn-link    { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:7px 12px; font-size:12px; font-weight:600; color:var(--blue); cursor:pointer; }
    .btn-link:hover { background:#e8edf8; }

    /* ── Picker ── */
    #screen-picker { display:none; flex-direction:column; min-height:100vh; }
    .picker-hero { background:linear-gradient(135deg,var(--blue) 0%,#001f6e 55%,var(--red) 100%); padding:24px 16px 0; }
    .picker-hero .hero-inner { margin-bottom:0; }
    .search-wrap { position:relative; }
    .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:rgba(255,255,255,.5); font-size:16px; pointer-events:none; }
    #search-input {
      width:100%; background:rgba(255,255,255,.12); backdrop-filter:blur(12px);
      border:1.5px solid rgba(255,255,255,.25); border-radius:14px;
      padding:12px 14px 12px 42px; font-size:14px; color:#fff; outline:none;
    }
    #search-input::placeholder { color:rgba(255,255,255,.45); }
    #search-input:focus { border-color:rgba(255,255,255,.6); }

    .filter-wrap { background:#fff; border-bottom:1px solid var(--border); overflow-x:auto; white-space:nowrap; }
    .filter-inner { display:inline-flex; padding:0 14px; }
    .filter-btn { background:none; border:none; border-bottom:3px solid transparent; font-family:var(--font-d); font-size:13px; font-weight:700; letter-spacing:.04em; color:var(--muted); padding:11px 12px 8px; cursor:pointer; white-space:nowrap; text-transform:uppercase; transition:all .15s; }
    .filter-btn.active { color:var(--red); border-bottom-color:var(--red); }
    .filter-count { font-size:10px; opacity:.6; }
    .picker-body { flex:1; max-width:640px; margin:0 auto; width:100%; padding:18px 14px 32px; }

    .cat-group  { margin-bottom:24px; }
    .cat-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
    .cat-emoji  { font-size:16px; }
    .cat-title  { font-family:var(--font-d); font-size:18px; font-weight:800; text-transform:uppercase; }
    .cat-count  { font-size:11px; font-weight:700; color:var(--muted); background:var(--border); border-radius:10px; padding:1px 7px; }

    .comp-card  { background:var(--card); border:1.5px solid var(--border); border-radius:12px; margin-bottom:7px; overflow:hidden; cursor:pointer; transition:all .15s; box-shadow:0 1px 4px rgba(0,30,80,.05); }
    .comp-card:hover { border-color:var(--blue-l); box-shadow:var(--shadow); transform:translateY(-1px); }
    .comp-card-inner { display:flex; align-items:center; gap:10px; padding:11px 13px; }
    .comp-pct   { width:38px; height:38px; border-radius:9px; background:var(--bg); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .comp-pct span { font-family:var(--font-d); font-size:12px; font-weight:800; color:var(--blue); }
    .comp-info  { flex:1; min-width:0; }
    .comp-name  { font-family:var(--font-d); font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .comp-teams-count { font-size:11px; color:var(--muted); margin-top:2px; }
    .comp-arrow { color:var(--muted); font-size:18px; }
    .comp-progress { height:3px; background:var(--bg); }
    .comp-progress-bar { height:100%; background:linear-gradient(90deg,var(--blue),var(--red)); }

    /* ── Detail ── */
    #screen-detail { display:none; flex-direction:column; min-height:100vh; }
    .detail-header {
      background:linear-gradient(135deg,var(--blue) 0%,#001850 100%);
      padding:12px 14px 0; position:sticky; top:0; z-index:100;
      box-shadow:0 2px 12px rgba(0,20,60,.3);
    }
    .back-btn { background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:6px 12px; font-size:13px; font-weight:600; cursor:pointer; margin-bottom:10px; }
    .detail-comp-name { font-family:var(--font-d); font-size:clamp(17px,5vw,24px); font-weight:900; color:#fff; letter-spacing:-.5px; line-height:1.1; margin-bottom:3px; }
    .detail-meta { font-size:11px; color:rgba(255,255,255,.6); margin-bottom:10px; }
    .detail-tabs { display:flex; gap:2px; overflow-x:auto; }
    .detail-tab { background:none; border:none; border-bottom:3px solid transparent; font-family:var(--font-d); font-size:14px; font-weight:700; color:rgba(255,255,255,.55); padding:9px 14px 6px; cursor:pointer; text-transform:uppercase; letter-spacing:.04em; transition:all .15s; white-space:nowrap; }
    .detail-tab.active { color:#fff; border-bottom-color:var(--gold); }
    .detail-body { flex:1; max-width:680px; margin:0 auto; width:100%; padding:16px 12px 32px; }
    .panel { display:none; animation:fadeUp .25s ease; }
    .panel.active { display:block; }

    /* ── Team spotlight (summary panel) ── */
    .team-spotlight { background:var(--card); border:1.5px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:16px; box-shadow:var(--shadow); }
    .spotlight-header { display:flex; align-items:center; gap:10px; padding:13px 14px; background:linear-gradient(135deg,rgba(0,61,165,.06),transparent); border-bottom:1px solid var(--border); }
    .spotlight-shield { width:36px; height:36px; object-fit:contain; background:var(--bg); border-radius:8px; padding:2px; }
    .spotlight-shield-ph { width:36px; height:36px; background:var(--bg); border-radius:8px; display:inline-block; }
    .spotlight-name { font-family:var(--font-d); font-size:17px; font-weight:800; }
    .spotlight-comp { font-size:11px; color:var(--muted); margin-top:2px; }
    .btn-star { background:none; border:none; font-size:22px; cursor:pointer; color:var(--gold); margin-left:auto; padding:4px; }
    .spotlight-stats { display:grid; grid-template-columns:repeat(6,1fr); border-bottom:1px solid var(--border); }
    .sstat { text-align:center; padding:10px 4px; border-right:1px solid var(--border); }
    .sstat:last-child { border-right:none; }
    .sstat-v { font-family:var(--font-d); font-size:20px; font-weight:900; }
    .sstat-l { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-top:2px; }
    .spotlight-section { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; padding:10px 14px 4px; }

    /* ── Cards & stats ── */
    .card  { background:var(--card); border-radius:14px; overflow:hidden; box-shadow:var(--shadow); }
    .section-title { font-family:var(--font-d); font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; padding:12px 14px 8px; }
    .podium-row { display:flex; align-items:center; gap:10px; padding:11px 14px; }
    .podium-shield { width:30px; height:30px; object-fit:contain; background:var(--bg); border-radius:6px; padding:2px; }
    .podium-name { font-weight:700; font-size:14px; }
    .podium-meta { font-size:11px; color:var(--muted); margin-top:2px; }
    .podium-pts  { font-family:var(--font-d); font-size:22px; font-weight:900; color:var(--red); text-align:center; }
    .podium-pts-lbl { font-size:9px; color:var(--muted); text-transform:uppercase; }

    .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px; }
    .stat-card { background:var(--card); border-radius:12px; padding:12px 6px; text-align:center; box-shadow:0 1px 4px rgba(0,30,80,.05); border:1.5px solid var(--border); }
    .stat-val  { font-family:var(--font-d); font-size:24px; font-weight:900; line-height:1; }
    .stat-lbl  { font-size:10px; font-weight:700; color:var(--muted); margin-top:3px; text-transform:uppercase; letter-spacing:.04em; }
    .info-box  { background:#eff6ff; border:1.5px solid #bfdbfe; border-radius:12px; padding:11px 13px; font-size:12px; color:#1d4ed8; margin-top:14px; }

    /* ── Classification ── */
    .classif-wrap { background:var(--card); border-radius:14px; overflow:hidden; box-shadow:var(--shadow); }
    .classif-table { width:100%; border-collapse:collapse; font-size:13px; }
    .classif-table thead tr { background:var(--bg); }
    .classif-table th { padding:8px 6px; font-family:var(--font-d); font-size:10px; font-weight:700; color:var(--muted); letter-spacing:.06em; text-align:center; border-bottom:1px solid var(--border); text-transform:uppercase; }
    .classif-table th:nth-child(2) { text-align:left; }
    .classif-table td { padding:9px 6px; border-bottom:1px solid #f0f2f8; text-align:center; }
    .classif-table td:nth-child(2) { text-align:left; }
    .classif-table tr:last-child td { border-bottom:none; }
    .classif-table tr.my-team { background:#eff6ff; }
    .pos-badge { display:inline-flex; align-items:center; justify-content:center; min-width:24px; font-family:var(--font-d); font-size:13px; font-weight:800; padding:2px 4px; border-radius:6px; }
    .team-name-cell { display:flex; align-items:center; gap:7px; }
    .team-shield { width:22px; height:22px; object-fit:contain; background:var(--bg); border-radius:4px; padding:1px; }
    .team-shield-ph { width:22px; height:22px; background:var(--bg); border-radius:4px; display:inline-block; }
    .my-mark { color:var(--red); font-size:10px; margin-left:4px; }
    .green { color:#16a34a; font-weight:600; }
    .yellow{ color:#d97706; }
    .red   { color:#dc2626; }
    .pts   { font-weight:800; font-size:14px; }
    .pts-mine { color:var(--red); }

    /* ── Calendar ── */
    .team-filter-wrap { margin-bottom:13px; }
    .team-filter-label { font-family:var(--font-d); font-size:11px; font-weight:700; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:7px; }
    .team-chips { display:flex; flex-wrap:wrap; gap:5px; }
    .team-chip { display:flex; align-items:center; gap:5px; background:var(--card); border:1.5px solid var(--border); border-radius:18px; padding:5px 10px 5px 6px; font-size:12px; font-weight:600; color:var(--text); cursor:pointer; transition:all .15s; }
    .team-chip:hover { border-color:var(--blue-l); color:var(--blue); }
    .team-chip.active { background:var(--blue); border-color:var(--blue); color:#fff; }
    .chip-shield { width:16px; height:16px; object-fit:contain; }
    .chip-shield-ph { width:16px; height:16px; display:inline-block; }
    .cal-legend { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
    .cal-section { margin-bottom:14px; }
    .cal-label { font-family:var(--font-d); font-size:11px; font-weight:700; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:6px; padding:0 2px; }

    /* ── Match cards ── */
    .match-card { background:var(--card); border:1.5px solid var(--border); border-radius:11px; padding:10px 12px; margin-bottom:5px; box-shadow:0 1px 3px rgba(0,30,80,.05); border-left:4px solid transparent; }
    .match-card.win  { border-left-color:#16a34a; }
    .match-card.draw { border-left-color:#d97706; }
    .match-card.loss { border-left-color:#dc2626; }
    .match-card.pending { border-left-color:var(--blue-l); background:#f8faff; }
    .match-row { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:8px; }
    .match-team { display:flex; align-items:center; gap:6px; }
    .match-team.left { justify-content:flex-end; flex-direction:row-reverse; }
    .match-team.right { justify-content:flex-start; }
    .mshield { width:24px; height:24px; object-fit:contain; background:var(--bg); border-radius:5px; padding:1px; }
    .mshield-ph { width:24px; height:24px; background:var(--bg); border-radius:5px; display:inline-block; }
    .mname { font-size:12px; font-weight:600; color:var(--text); line-height:1.2; }
    .match-team.left .mname  { text-align:right; }
    .match-team.right .mname { text-align:left; }
    .match-team.mine .mname  { color:var(--blue); font-weight:800; }
    .match-center { text-align:center; }
    .score { background:var(--red); color:#fff; border-radius:7px; padding:4px 8px; font-family:var(--font-d); font-size:16px; font-weight:900; display:inline-block; min-width:54px; }
    .pending-score { background:var(--blue-l); font-size:12px; padding:4px 6px; }
    .match-date { font-size:10px; color:var(--muted); margin-top:3px; }
    .jornada-label { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:5px; }

    /* ── Result badges ── */
    .rbadge { display:inline-flex; font-family:var(--font-d); font-size:11px; font-weight:700; padding:2px 7px; border-radius:7px; margin-top:4px; }
    .rbadge.win  { background:#dcfce7; color:#16a34a; }
    .rbadge.draw { background:#fef3c7; color:#b45309; }
    .rbadge.loss { background:#fee2e2; color:#dc2626; }
    .rbadge.pending-badge { background:#dbeafe; color:#1d4ed8; }

    /* ── Empty / Error ── */
    .empty-state { text-align:center; padding:36px 20px; color:var(--muted); }
    .empty-icon  { font-size:40px; margin-bottom:10px; }
    .btn-secondary { background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3); color:#fff; font-size:13px; font-weight:600; padding:9px 18px; border-radius:10px; cursor:pointer; }

    @media(max-width:480px) {
      .stats-row { grid-template-columns:repeat(2,1fr); }
      .spotlight-stats { grid-template-columns:repeat(3,1fr); }
      .fav-stats { grid-template-columns:repeat(2,1fr); }
      .mname { font-size:11px; }
    }
  </style>
</head>
<body>

  <!-- LOADING -->
  <div id="screen-loading">
    <div class="loading-logo">🏒 FECAPA</div>
    <div class="loading-sub">Hoquei Patins Catalunya</div>
    <div class="spinner"></div>
    <div class="loading-note" id="loading-note">Carregant dades...</div>
  </div>

  <!-- HOME (favourites) -->
  <div id="screen-home" style="display:none"></div>

  <!-- PICKER -->
  <div id="screen-picker" style="display:none">
    <div class="picker-hero">
      <div class="hero-inner">
        <div class="hero-badge">🏒 Temporada <span id="hero-season">2025-26</span></div>
        <p class="hero-sub" id="hero-sub" style="margin-bottom:14px">Totes les competicions de la FECAPA</p>
        <div class="search-wrap" style="margin-bottom:14px">
          <span class="search-icon">🔍</span>
          <input id="search-input" type="text" placeholder="Cerca equip o competició..." autocomplete="off"/>
        </div>
        <button class="btn-secondary" onclick="document.getElementById('screen-picker').style.display='none';document.getElementById('screen-home').style.display='flex';" style="margin-bottom:14px">
          ← Tornar als meus equips
        </button>
      </div>
    </div>
    <div class="filter-wrap">
      <div class="filter-inner" id="filter-tabs"></div>
    </div>
    <div class="picker-body" id="picker-body"></div>
  </div>

  <!-- DETAIL -->
  <div id="screen-detail" style="display:none">
    <div class="detail-header">
