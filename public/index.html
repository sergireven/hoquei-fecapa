<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>FECAPA · Hoquei Patins Catalunya</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Barlow',sans-serif;background:#f0f4f8;color:#1a2035;min-height:100vh}
    button,input,select{font-family:inherit}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:#e2e6ef;border-radius:4px}
    a{color:#003da5}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Loading */
    #screen-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;background:#fff}
    .loading-logo{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:900;color:#e5001c}
    .loading-sub{font-family:'Barlow Condensed',sans-serif;font-size:14px;color:#6b7a99;letter-spacing:.15em;text-transform:uppercase}
    .spinner{width:34px;height:34px;border:3px solid #f0f4f8;border-top-color:#e5001c;border-radius:50%;animation:spin .7s linear infinite}

    /* Screens */
    #screen-home,#screen-picker,#screen-detail,#screen-acta{display:none;flex-direction:column;min-height:100vh}

    /* Home header */
    .home-header{background:#fff;border-bottom:1px solid #e2e6ef;padding:11px 16px;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,20,60,.06)}
    .home-header-inner{max-width:620px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
    .home-logo{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:900}
    .home-logo span{color:#e5001c}
    .btn-icon{background:#f0f4f8;border:1px solid #e2e6ef;border-radius:10px;padding:7px 14px;cursor:pointer;font-size:13px;font-weight:600;color:#1a2035}
    #home-body{max-width:620px;margin:0 auto;width:100%;padding:16px 14px 32px}

    /* Picker */
    .picker-header{background:linear-gradient(135deg,#003da5 0%,#001f6e 60%,#e5001c 100%);padding:16px 16px 20px;display:flex;align-items:center;gap:12px}
    .back-btn-picker{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer}
    .picker-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:#fff}
    #picker-content{flex:1;overflow-y:auto}

    /* Detail header */
    .detail-header{background:linear-gradient(135deg,#003da5 0%,#001850 100%);padding:12px 14px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,20,60,.3)}
    .detail-header-inner{max-width:680px;margin:0 auto}
    #back-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:10px}
    #detail-comp-name{font-family:'Barlow Condensed',sans-serif;font-size:clamp(16px,5vw,22px);font-weight:900;color:#fff;letter-spacing:-.5px;line-height:1.1;margin-bottom:3px}
    #detail-meta{font-size:11px;color:rgba(255,255,255,.6);margin-bottom:10px}
    .detail-tabs{display:flex;gap:2px;overflow-x:auto}
    .detail-tab{background:none;border:none;border-bottom:3px solid transparent;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:rgba(255,255,255,.55);padding:9px 14px;cursor:pointer}
    .detail-tab.active{color:#fff;border-bottom-color:#f0a500}
    .detail-body{flex:1;max-width:680px;margin:0 auto;width:100%;padding:16px 12px 32px}
    .panel{display:none}
    .panel.active{display:block;animation:fadeUp .2s ease}

    /* Filter tabs (for future use) */
    .filter-wrap{background:#fff;border-bottom:1px solid #e2e6ef;overflow-x:auto;white-space:nowrap}
    .filter-inner{display:inline-flex;padding:0 14px}
    .filter-btn{background:none;border:none;border-bottom:3px solid transparent;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:#6b7a99;padding:10px 12px 7px;cursor:pointer}
    .filter-btn.active{color:#e5001c;border-bottom-color:#e5001c}

    select{appearance:auto}
    @media(max-width:500px){
      .acta-teams-grid{grid-template-columns:1fr!important}
    }
      /* Mobile: larger base font sizes */
      body { font-size: 15px; }
      .detail-tab { font-size: 13px; padding: 9px 10px 6px; }
      #detail-comp-name { font-size: 16px; }
    }
    @media(max-width:400px){
      #detail-comp-name { font-size: 15px; }
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="screen-loading">
  <div class="loading-logo">🏒 FECAPA</div>
  <div class="loading-sub">Hoquei Patins Catalunya</div>
  <div class="spinner"></div>
  <div id="loading-note" style="font-size:13px;color:#6b7a99">Carregant dades...</div>
</div>

<!-- HOME -->
<div id="screen-home" style="display:none">
  <div id="home-header" style="background:#fff;border-bottom:1px solid #e2e6ef;padding:11px 14px;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,20,60,.06)"></div>
  <div id="home-body" style="max-width:680px;margin:0 auto;width:100%;padding:14px 14px 32px"></div>
</div>

<!-- PICKER -->
<div id="screen-picker" style="display:none">
  <div class="picker-header">
    <button class="back-btn-picker" onclick="document.getElementById('screen-picker').style.display='none';document.getElementById('screen-home').style.display='flex';">← Enrere</button>
    <div class="picker-title">Afegir equip favorit</div>
  </div>
  <div id="picker-content" style="flex:1;overflow-y:auto"></div>
</div>

<!-- DETAIL -->
<div id="screen-detail" style="display:none">
  <div class="detail-header">
    <div class="detail-header-inner">
      <div><button id="back-btn">← Enrere</button></div>
      <div id="detail-comp-name"></div>
      <div id="detail-meta"></div>
      <div class="detail-tabs">
        <button class="detail-tab active" data-tab="classif">Classificació</button>
        <button class="detail-tab" data-tab="calendar">Calendari</button>
        <button class="detail-tab" data-tab="jugadors">Jugadors</button>
      </div>
    </div>
  </div>
  <div class="detail-body">
    <div id="panel-classif" class="panel active"></div>
    <div id="panel-calendar" class="panel"></div>
    <div id="panel-jugadors" class="panel"></div>
  </div>
</div>

<!-- ACTA DETAIL -->
<div id="screen-acta" style="display:none">
  <div class="detail-header">
    <div class="detail-header-inner">
      <div><button id="acta-back-btn">← Enrere</button></div>
      <div id="acta-header-title" style="font-family:'Barlow Condensed',sans-serif;font-size:clamp(14px,4vw,19px);font-weight:900;color:#fff;letter-spacing:-.3px;line-height:1.15;margin-bottom:3px"></div>
      <div id="acta-header-meta" style="font-size:11px;color:rgba(255,255,255,.6);padding-bottom:12px"></div>
    </div>
  </div>
  <div id="acta-body" style="max-width:680px;margin:0 auto;width:100%;padding:16px 14px 40px;flex:1;overflow-y:auto"></div>
</div>


<span id="hero-season" style="display:none"></span>
<span id="hero-sub" style="display:none"></span>

<div id="last-update-bar" style="display:none;text-align:center;padding:8px 14px;font-size:11px;color:#6b7a99;background:#f0f4f8;border-top:1px solid #e2e6ef"></div>

<script src="js/app.js"></script>
<script src="js/team-details.js"></script>
<script src="js/match-details.js"></script>
</body>
</html>
